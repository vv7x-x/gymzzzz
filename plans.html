<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plans — GYMOS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="toastContainer" class="toast-container" role="status" aria-live="polite"></div>
  <div class="sidebar-overlay" aria-hidden="true"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar" aria-label="Main navigation">
      <div class="sidebar-header"><div class="logo-icon"><img src="logo.svg" alt="GYMOS" width="36" height="36"></div><span class="logo-text">GYMOS</span></div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer" id="sidebarFooter"></div>
    </aside>
    <main class="main-content" id="main-content" role="main">
      <header class="topbar" role="banner">
        <div class="topbar-left">
          <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle navigation menu"><i class="bi bi-list" aria-hidden="true"></i></button>
          <h2>Plans</h2>
        </div>
        <div class="topbar-right"></div>
      </header>
      <div class="page-content">
        <div class="page-header">
          <h1 data-i18n="plans.title">Membership Plans</h1>
          <p data-i18n="plans.subtitle">Manage your membership plans and pricing</p>
        </div>

        <div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap">
          <button class="btn btn-primary" id="addPlanBtn"><i class="bi bi-plus-lg"></i> <span data-i18n="plans.add">Add Plan</span></button>
        </div>

        <div id="plansContainer"><p class="text-muted">Loading...</p></div>
      </div>
    </main>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { requireAuth } from './js/auth.js';
    import { renderSidebar, initTopbar, pageTransition } from './js/ui.js';
    import { formatCurrency, showConfirm, showToast, showModal } from './js/utils.js';
    import { applyLang, t } from './js/i18n.js';

    const user = await requireAuth();
    applyLang();
    renderSidebar('plans');
    initTopbar(t('plans.title'));
    pageTransition();
    document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });

    const container = document.getElementById('plansContainer');

    async function loadPlans() {
      const { data: plans, error } = await supabase.from('plans').select('*').order('price');
      if (error) { container.innerHTML = '<p class="text-danger">Error loading plans</p>'; return; }
      if (!plans || plans.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-boxes"></i><h3>No plans yet</h3><p>Create your first membership plan.</p></div>';
        return;
      }

      container.innerHTML = `
        <div class="pricing-grid" style="max-width:900px">
          ${plans.map(p => `
            <div class="pricing-card" data-id="${p.id}">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
                <span style="width:12px;height:12px;border-radius:50%;background:${p.color || 'var(--primary)'}"></span>
                <div class="pricing-name" style="margin-bottom:0">${p.name}</div>
              </div>
              <div class="pricing-price">
                <span class="amount">${formatCurrency(p.price)}</span>
                <span class="period">/${p.duration_days} days</span>
              </div>
              ${p.description ? `<p style="font-size:var(--text-sm);color:var(--text-muted);margin-bottom:16px">${p.description}</p>` : ''}
              <div style="margin-top:auto;display:flex;gap:8px">
                <button class="btn btn-sm btn-ghost edit-plan" data-id="${p.id}" style="flex:1;justify-content:center"><i class="bi bi-pencil"></i> Edit</button>
                <button class="btn btn-sm btn-ghost delete-plan" data-id="${p.id}" style="color:var(--danger);flex:1;justify-content:center"><i class="bi bi-trash"></i></button>
              </div>
            </div>`).join('')}
        </div>`;

      document.querySelectorAll('.edit-plan').forEach(btn => {
        btn.addEventListener('click', () => showPlanForm(plans.find(p => p.id === btn.dataset.id)));
      });
      document.querySelectorAll('.delete-plan').forEach(btn => {
        btn.addEventListener('click', async () => {
          const confirmed = await showConfirm(t('plans.deleteConfirm'), t('plans.deleteMsg'));
          if (confirmed) {
            await supabase.from('plans').delete().eq('id', btn.dataset.id);
            showToast('Plan deleted');
            loadPlans();
          }
        });
      });
    }

    function showPlanForm(plan = null) {
      const isEdit = !!plan;
      const html = `
        <form id="planForm">
          <div class="form-group">
            <label>${t('plans.name')} <span class="required">*</span></label>
            <input type="text" class="form-control" id="planName" required value="${plan?.name || ''}" placeholder="e.g. Premium Monthly">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>${t('plans.duration')} <span class="required">*</span></label>
              <input type="number" class="form-control" id="planDuration" required min="1" value="${plan?.duration_days || 30}">
            </div>
            <div class="form-group">
              <label>${t('plans.price')} <span class="required">*</span></label>
              <input type="number" class="form-control" id="planPrice" required min="0" step="0.01" value="${plan?.price || ''}" placeholder="49.00">
            </div>
          </div>
          <div class="form-group">
            <label>${t('plans.description')}</label>
            <textarea class="form-control" id="planDescription" rows="2" placeholder="What's included...">${plan?.description || ''}</textarea>
          </div>
          <div class="form-group">
            <label>${t('plans.color')}</label>
            <input type="color" class="form-control" id="planColor" value="${plan?.color || '#3b82f6'}" style="height:44px;padding:4px">
          </div>
          <button type="submit" class="btn btn-primary btn-full"><i class="bi bi-check-lg"></i> ${isEdit ? t('plans.update') : t('plans.create')}</button>
        </form>`;

      const { close } = showModal(isEdit ? t('plans.edit') : t('plans.add'), html);

      document.getElementById('planForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
          name: document.getElementById('planName').value.trim(),
          duration_days: parseInt(document.getElementById('planDuration').value),
          price: parseFloat(document.getElementById('planPrice').value),
          description: document.getElementById('planDescription').value.trim() || null,
          color: document.getElementById('planColor').value
        };

        try {
          if (isEdit) {
            await supabase.from('plans').update(data).eq('id', plan.id);
            showToast('Plan updated');
          } else {
            await supabase.from('plans').insert(data);
            showToast('Plan created');
          }
          close();
          loadPlans();
        } catch (err) {
          showToast(err.message || 'Error saving plan', 'error');
        }
      });
    }

    document.getElementById('addPlanBtn').addEventListener('click', () => showPlanForm());
    loadPlans();
  </script>
</body>
</html>
